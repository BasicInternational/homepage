  </text>

  <!-- Timeline Line -->
  <line x1="300" y1="250" x2="300" y2="1350" stroke="#D8E1ED" stroke-width="4"/>

  <!-- 2024 -->
  <circle cx="300" cy="320" r="10" fill="#fff" stroke="#1F3A68" stroke-width="4"/>
  <text x="340" y="310" font-size="28" font-weight="bold" fill="#1F3A68">2024</text>
  <text x="340" y="350" font-size="18" fill="#2D6CDF">02월</text>
  <text x="420" y="350" font-size="18" fill="#333">회사 확장 이전</text>
  <text x="420" y="380" font-size="18" fill="#333">유지보수팀 창설</text>

  <!-- 2023 -->
  <circle cx="300" cy="500" r="10" fill="#fff" stroke="#1F3A68" stroke-width="4"/>
  <text x="340" y="490" font-size="28" font-weight="bold" fill="#1F3A68">2023</text>
  <text x="340" y="530" font-size="18" fill="#2D6CDF">07월</text>
  <text x="420" y="530" font-size="18" fill="#333">에이전시랩 창설</text>
  <text x="340" y="560" font-size="18" fill="#2D6CDF">03월</text>
  <text x="420" y="560" font-size="18" fill="#333">SyncBoost 솔루션 출시</text>

  <!-- 2022 -->
  <circle cx="300" cy="700" r="10" fill="#fff" stroke="#1F3A68" stroke-width="4"/>
  <text x="340" y="690" font-size="28" font-weight="bold" fill="#1F3A68">2022</text>
  <text x="340" y="730" font-size="18" fill="#2D6CDF">12월</text>
  <text x="420" y="730" font-size="18" fill="#333">e-서비스 사업팀 창설</text>
  <text x="340" y="760" font-size="18" fill="#2D6CDF">08월</text>
  <text x="420" y="760" font-size="18" fill="#333">e-biz 사업팀 창설</text>

  <!-- Footer -->
  <rect x="0" y="1450" width="1200" height="150" fill="#111"/>
  <text x="600" y="1520" text-anchor="middle" font-size="16" fill="#aaa">
    Copyright © 2026 Basic International
